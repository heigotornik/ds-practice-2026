syntax = "proto3";

package suggestion;

service SuggestionService {
    rpc UpdateStatus (StatusUpdateRequest) returns (StatusUpdateResponse);
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);
}

message InitOrderRequest {
  string id = 1;
  OrderData order = 2;
}

message InitOrderResponse {
  bool ok = 1;
}

message StatusUpdateRequest {
  string id = 1;
  int32 TransactionServiceA = 2;
  int32 TransactionServiceB = 3;
  int32 FraudDetection = 4;
  int32 Suggestions = 5;
}

message StatusUpdateResponse {
  string id = 1;
  bool ok = 2;
  string message = 3;
}

message OrderData {
  User user = 1;
  CreditCard creditCard = 2;
  string userComment = 3;

  repeated Item items = 4;

  Address billingAddress = 5;

  string shippingMethod = 6;
  bool giftWrapping = 7;
  bool termsAccepted = 8;
}

message User {
  string name = 1;
  string contact = 2;
}

message CreditCard {
  string number = 1;
  string expirationDate = 2;
  string cvv = 3;
}

message Item {
  string name = 1;
  int32 quantity = 2;
}

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string zip = 4;
  string country = 5;
}

message VerifyResponse {
  bool isValid = 1;
  optional string message = 2;
}

message Book{
    int32 bookId = 1;
    string title = 2;
    string author = 3;
}