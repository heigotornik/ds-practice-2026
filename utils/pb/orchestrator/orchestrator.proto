syntax = "proto3";

service CheckoutResultService {
  rpc ReportResult (CheckoutResult) returns (Ack);
}

message CheckoutResult {
  string orderId = 1;
  bool success = 2;
  string message = 3;
  repeated Book suggestedBooks = 4;
}

message Book{
    int32 bookId = 1;
    string title = 2;
    string author = 3;
}

message Ack {
  bool received = 1;
}