syntax = "proto3";

package suggestion;

service SuggestionService {
    rpc SuggestBooks (BookList) returns (BookList);
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);
}

message InitOrderRequest {
  string id = 1;
  BookList books = 2;
}

message InitOrderResponse {
  bool ok = 1;
}

message BookList {
    repeated Book books = 1;
}

message Book{
    int32 bookId = 1;
    string title = 2;
    string author = 3;
}